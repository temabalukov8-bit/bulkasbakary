<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <title>Bulka's Bakery — Домашняя кондитерская</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Bulka's Bakery</h1>
            <p>Домашняя кондитерская</p>
        </div>
        <button class="cartBtn" id="openCart">Корзина (<span id="cartCount">0</span>)</button>
    </div>

    <div class="banner">
        <h2>Самые вкусные торты и пирожные</h2>
        <p>Ручная работа, только натуральные продукты</p>
    </div>

    <div class="productsList" id="productsList"></div>

    <div class="reviewsBlock">
        <h2 class="reviewsTitle">Отзывы наших клиентов</h2>
        <div class="reviewsList" id="reviewsList">
            <div class="emptyReviews">Пока нет отзывов. Будьте первым!</div>
        </div>
        <div class="addReviewBlock">
            <h3>Оставить отзыв</h3>
            <input type="text" id="reviewName" placeholder="Ваше имя" class="reviewInput">
            <textarea id="reviewText" placeholder="Ваш отзыв" rows="3" class="reviewTextarea"></textarea>
            <button class="reviewBtn" id="addReviewBtn">Добавить отзыв</button>
        </div>
    </div>

    <footer class="footer">
        Доставка от 1500 руб. | Режим работы: 10:00-20:00 | Нижний Новгород
    </footer>

    <div id="modal" class="modal">
        <div class="modalContent">
            <div class="modalHeader">
                <span>Моя корзина</span>
                <span class="close" id="closeCart">&times;</span>
            </div>
            <div id="cartItems"></div>
            <div class="total" id="totalAmount">Итого: 0 руб.</div>
            <div class="modFoot">
                <button class="clearBtn" id="clearCart">Очистить</button>
                <button class="orderBtn" id="orderCart">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
